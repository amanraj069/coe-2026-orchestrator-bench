---
- name: Setup HashiCorp Nomad and Consul
  hosts: cluster
  become: yes
  tasks:
    - name: Install HashiCorp repo and dependencies
      shell: |
        apt-get update && apt-get install -y wget gpg coreutils
        wget -qO- https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" > /etc/apt/sources.list.d/hashicorp.list
        apt-get update
        apt-get install -y nomad consul
      args:
        creates: /usr/bin/nomad

- name: Configure Nomad Server
  hosts: master
  become: yes
  tasks:
    - name: Setup Server Config
      shell: |
        mkdir -p /opt/nomad/data
        chown -R nomad:nomad /opt/nomad
        rm -f /etc/nomad.d/*.hcl
        cat <<EOF > /etc/nomad.d/nomad.hcl
        data_dir = "/opt/nomad/data"
        bind_addr = "0.0.0.0"
        advertise {
          http = "{{ ansible_host }}"
          rpc  = "{{ ansible_host }}"
          serf = "{{ ansible_host }}"
        }
        server {
          enabled = true
          bootstrap_expect = 1
        }
        client {
          enabled = false
        }
        EOF
        systemctl enable nomad
        systemctl restart nomad

    - name: Setup Consul Server
      shell: |
        mkdir -p /opt/consul
        chown -R consul:consul /opt/consul
        rm -f /etc/consul.d/*.hcl
        cat <<EOF > /etc/consul.d/consul.hcl
        data_dir = "/opt/consul"
        bind_addr = "0.0.0.0"
        client_addr = "0.0.0.0"
        advertise_addr = "{{ ansible_host }}"
        server = true
        bootstrap_expect = 1
        ui_config {
          enabled = true
        }
        EOF
        systemctl enable consul
        systemctl restart consul

- name: Configure Nomad Clients
  hosts: workers
  become: yes
  tasks:
    - name: Setup Client Config
      shell: |
        mkdir -p /opt/nomad/data
        chown -R nomad:nomad /opt/nomad
        rm -f /etc/nomad.d/*.hcl
        cat <<EOF > /etc/nomad.d/nomad.hcl
        data_dir = "/opt/nomad/data"
        bind_addr = "0.0.0.0"
        advertise {
          http = "{{ ansible_host }}"
          rpc  = "{{ ansible_host }}"
          serf = "{{ ansible_host }}"
        }
        server {
          enabled = false
        }
        client {
          enabled = true
          servers = ["{{ hostvars['master']['ansible_host'] }}:4647"]
        }
        EOF
        systemctl enable nomad
        systemctl restart nomad

    - name: Setup Consul Client
      shell: |
        mkdir -p /opt/consul
        chown -R consul:consul /opt/consul
        rm -f /etc/consul.d/*.hcl
        cat <<EOF > /etc/consul.d/consul.hcl
        data_dir = "/opt/consul"
        bind_addr = "0.0.0.0"
        client_addr = "0.0.0.0"
        advertise_addr = "{{ ansible_host }}"
        retry_join = ["{{ hostvars['master']['ansible_host'] }}"]
        EOF
        systemctl enable consul
        systemctl restart consul

